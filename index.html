  {code:"RESPIRATORY",name:"호흡기",icon:"🫁",color:"#74B9FF",rate:0.92,hAge:42},
  {code:"CANCER",name:"면역",icon:"🛡️",color:"#00B894",rate:1.05,hAge:46},

const SPECIALS=[{name:"여성 건강",icon:"♀️"},{name:"갱년기(여)",icon:"🌸"},{name:"임산부",icon:"🤰"},{name:"구강/치아",icon:"🦷"},{name:"피부",icon:"✨"},{name:"정신 건강",icon:"🧘"}];

const META_Q=[
  {id:"META02_1",level:"A",type:"multi",q:"다음 중 해당하는 증상을\n모두 선택해주세요.",opts:["식후 심한 졸음","갈증이 잦다","소변을 자주 본다","상처 회복이 느리다","손발 저림","해당 없음"]},
  {id:"META02_2",level:"B",type:"single",q:"식후 졸림이 심한 편이라면,\n어떤 식사 후인가요?",opts:["탄수화물 위주 식사 후","어떤 식사든","과식했을 때","단 음식 먹은 후"]},
  {id:"META02_3",level:"B",type:"multi",q:"가족 중 다음 진단을\n받은 분이 있나요?",opts:["당뇨","고혈압","비만","고지혈증","없음/모름"]},
  {id:"META02_4",level:"C",type:"single",q:"단 음식이나 탄수화물\n갈망 정도는?",opts:["거의 없다","가끔","자주","매우 강하다"]},
  {id:"META02_5",level:"C",type:"single",q:"식사 시간이 규칙적인\n편인가요?",opts:["매우 규칙적","대체로 규칙적","불규칙","매우 불규칙"]},
  {id:"META02_6",level:"C",type:"single",q:"공복혈당 수치를\n알고 계신가요?",opts:["100 미만 (정상)","100~125 (경계)","126 이상 (당뇨)","모름"]},
];

const MENTAL_Q=[
  {id:"SPEC10_1",level:"A",type:"multi",q:"정서 관련 증상이\n있으신가요?",opts:["우울감","불안감","무의미감","집중력 저하","수면 문제","해당 없음"]},
  {id:"SPEC10_2",level:"B",type:"single",q:"증상이 일상생활에\n영향을 주나요?",opts:["거의 없음","약간 영향","심한 영향","일상 불가능"]},
  {id:"SPEC10_3",level:"C",type:"single",q:"사회적 지지는\n있으신가요?",opts:["충분한 지지","어느 정도 있음","부족","거의 없음"]},
];
const MENTAL_INS=["불안 + 집중력 저하 + 수면 문제가 함께 나타나면, 우울증 초기 신호일 수 있어요","일상 기능에 영향이 있다면 가볍게 넘기지 마세요. 조기에 관리할수록 회복이 빨라요","사회적 지지가 부족하면 정신 건강 회복이 느려질 수 있어요. 작은 관계부터 넓혀보세요"];

// --- Phone ---
function Phone({children,title,onBack,rightEl,hideNav}){
  return(
    <div style={{width:390,maxWidth:"100%",flex:1,maxHeight:"calc(100vh - 140px)",borderRadius:40,overflow:"hidden",background:"#fff",boxShadow:"0 24px 80px rgba(0,0,0,0.18)",display:"flex",flexDirection:"column",position:"relative",fontFamily:"'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif"}}>
      <div style={{height:50,display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4,fontSize:13,fontWeight:600,flexShrink:0}}>9:41</div>
      {!hideNav&&<div style={{height:50,display:"flex",alignItems:"center",padding:"0 16px",background:"#fff",borderBottom:"1px solid #f0f2f5",flexShrink:0}}>
        {onBack?<div onClick={onBack} style={{cursor:"pointer",padding:4,marginRight:8}}><Back/></div>:<div style={{width:30}}/>}
        <div style={{flex:1,textAlign:"center",fontSize:16,fontWeight:800,color:C.dark}}>{title}</div>
        {rightEl||<div style={{width:30}}/>}
      </div>}
      {children}
      <div style={{height:78,display:"flex",alignItems:"center",justifyContent:"space-around",background:"#fff",borderTop:"1px solid #eee",flexShrink:0,paddingBottom:16}}>
        {[{l:"홈",i:"🏠"},{l:"건강",i:"💚",a:1},{l:"쇼핑",i:"🛒"},{l:"MY",i:"👤"}].map(t=>(
          <div key={t.l} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,opacity:t.a?1:0.4}}>
            <span style={{fontSize:20}}>{t.i}</span>
            <span style={{fontSize:10,fontWeight:t.a?700:500,color:t.a?C.cyan:"#94A3B8"}}>{t.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
const Bdg=({text,color})=><span style={{fontSize:10,fontWeight:700,color:"#fff",background:color||C.cyan,padding:"2px 8px",borderRadius:6,marginLeft:8}}>{text}</span>;
const NavH=()=><div style={{height:50,display:"flex",alignItems:"center",padding:"0 18px",borderBottom:"1px solid #f0f2f5",flexShrink:0}}><div style={{fontSize:20,fontWeight:900,color:C.dark,flex:1}}>건강</div><span style={{fontSize:11,background:`${C.cyan}12`,color:C.cyan,padding:"4px 10px",borderRadius:10,fontWeight:700}}>A-Care</span></div>;

// --- Generic Quiz Engine ---
function QuizEngine({title,questions,insights,popupTitle,popupSub,rateChanges,previews,onBack,onDone}){
  const [qi,setQi]=useState(0);
  const [ans,setAns]=useState({});
  const [fade,setFade]=useState(true);
  const [done,setDone]=useState(false);
  const q=questions[qi];
  const progress=((qi+(done?1:0))/questions.length)*100;
  const lc={A:C.red,B:C.orange,C:C.cyan};

  const toggle=(idx)=>{
    if(q.type==="single"){setAns(p=>({...p,[q.id]:[idx]}));return;}
    const cur=ans[q.id]||[];
    const isN=q.opts[idx]==="해당 없음"||q.opts[idx]==="없음/모름";
    if(isN){setAns(p=>({...p,[q.id]:[idx]}));return;}
    const f=cur.filter(i=>q.opts[i]!=="해당 없음"&&q.opts[i]!=="없음/모름");
    setAns(p=>({...p,[q.id]:f.includes(idx)?f.filter(i=>i!==idx):[...f,idx]}));
  };
  const hasA=(ans[q.id]||[]).length>0;
  const next=()=>{setFade(false);setTimeout(()=>{if(qi<questions.length-1)setQi(p=>p+1);else setDone(true);setFade(true);},200);};

  if(done){
    return(
      <Phone title={title} onBack={onBack} rightEl={<span style={{fontSize:13,color:"#94A3B8",fontWeight:600}}>완료</span>}>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,zIndex:50,background:"rgba(0,0,0,0.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
          <div style={{background:"#fff",borderRadius:24,width:"100%",maxHeight:"88%",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{background:`linear-gradient(145deg,${C.dark},#1E3548)`,borderRadius:"24px 24px 0 0",padding:"26px 20px 22px",color:"#fff",position:"relative"}}>
              <div onClick={onDone} style={{position:"absolute",top:16,right:16,cursor:"pointer",opacity:0.5}}><CloseX/></div>
              <div style={{textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:13,opacity:0.6}}>{popupTitle}</div>
                <div style={{fontSize:15,fontWeight:700,marginTop:4}}>{popupSub}</div>
              </div>
              {rateChanges&&(
                <>
                  <div style={{textAlign:"center",marginBottom:16}}>
                    <div style={{fontSize:12,opacity:0.5,marginBottom:6}}>종합 노화속도</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                      <span style={{fontSize:20,opacity:0.4,textDecoration:"line-through"}}>{rateChanges.mainB}배</span>
                      <span style={{fontSize:16,opacity:0.4}}>→</span>
                      <span style={{fontSize:34,fontWeight:900,color:C.red}}>{rateChanges.mainA}배</span>
                    </div>
                    <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:4}}>▲ {(rateChanges.mainA-rateChanges.mainB).toFixed(2)}배 증가</div>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                    {rateChanges.cats.map(c=>(
                      <div key={c.name} style={{background:"rgba(255,255,255,0.08)",borderRadius:14,padding:"12px 18px",textAlign:"center",border:"1px solid rgba(255,90,95,0.25)"}}>
                        <div style={{fontSize:12,opacity:0.6,marginBottom:4}}>{c.icon} {c.name}</div>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                          <span style={{fontSize:14,opacity:0.35,textDecoration:"line-through"}}>{c.b.toFixed(2)}</span>
                          <span style={{fontSize:11,opacity:0.3}}>→</span>
                          <span style={{fontSize:22,fontWeight:900,color:C.red}}>{c.a.toFixed(2)}배</span>
                        </div>
                        <div style={{fontSize:10,color:C.red,marginTop:3}}>▲ {(c.a-c.b).toFixed(2)}배</div>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
            <div style={{padding:"20px"}}>
              <div style={{fontSize:15,fontWeight:800,color:C.dark,marginBottom:14}}>💡 종합 인사이트</div>
              {insights.map((t,i)=>(
                <div key={i} style={{display:"flex",gap:10,marginBottom:8,padding:"11px 14px",background:i<2?"#FFF5F5":"#FFFBF0",borderRadius:12,border:`1px solid ${i<2?"#FECACA":"#FFF0CC"}`,alignItems:"flex-start"}}>
                  <div style={{width:22,height:22,borderRadius:6,background:i<2?`${C.red}15`:`${C.orange}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:i<2?C.red:C.orange,flexShrink:0,marginTop:1}}>{i+1}</div>
                  <div style={{fontSize:13,color:"#4A3728",lineHeight:1.55,fontWeight:500}}>{t}</div>
                </div>
              ))}
              {previews&&<>
                <div style={{fontSize:14,fontWeight:800,color:C.dark,margin:"18px 0 10px"}}>🎯 맞춤 추천 미리보기</div>
                <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4}}>
                  {previews.map((r,i)=>(
                    <div key={i} style={{minWidth:110,background:"#F8F9FA",borderRadius:14,padding:"14px 12px",textAlign:"center",border:"1px solid #F0F2F5",flexShrink:0}}>
                      <div style={{fontSize:22,marginBottom:6}}>{r.icon}</div>
                      <div style={{fontSize:12,fontWeight:700,color:C.dark,lineHeight:1.3}}>{r.label}</div>
                      <div style={{fontSize:10,color:C.cyan,fontWeight:600,marginTop:3}}>{r.sub}</div>
                    </div>
                  ))}
                </div>
              </>}
              <button onClick={onDone} style={{width:"100%",padding:16,borderRadius:14,border:"none",marginTop:20,background:C.cyan,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"}}>건강탭에서 자세히 보기</button>
            </div>
          </div>
        </div>
        <div style={{flex:1}}/>
      </Phone>
    );
  }

  return(
    <Phone title={title} onBack={onBack} rightEl={<span style={{fontSize:13,color:"#94A3B8",fontWeight:600}}>{qi+1}/{questions.length}</span>}>
      <div style={{height:3,background:"#F0F2F5",flexShrink:0}}><div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg,${C.cyan},${C.accent})`,transition:"width 0.4s"}}/></div>
      <div style={{flex:1,overflowY:"auto"}}>
        <div style={{padding:"24px 20px",opacity:fade?1:0,transform:fade?"translateY(0)":"translateY(12px)",transition:"all 0.25s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{fontSize:11,fontWeight:700,color:"#fff",background:lc[q.level],padding:"3px 10px",borderRadius:6}}>Level {q.level}</span>
            <span style={{fontSize:12,color:"#94A3B8"}}>{q.type==="multi"?"복수 선택":"단일 선택"}</span>
          </div>
          <div style={{fontSize:21,fontWeight:900,color:C.dark,lineHeight:1.5,marginBottom:28,whiteSpace:"pre-line"}}>{q.q}</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {q.opts.map((o,idx)=>{
              const sel=(ans[q.id]||[]).includes(idx);
              return(<div key={idx} onClick={()=>toggle(idx)} style={{display:"flex",alignItems:"center",gap:14,padding:"15px 16px",borderRadius:14,border:`2px solid ${sel?C.cyan:"#E9ECEF"}`,background:sel?`${C.cyan}06`:"#fff",cursor:"pointer",transition:"all 0.15s"}}>
                {q.type==="multi"?<Chk on={sel}/>:<Rad on={sel}/>}
                <span style={{fontSize:15,fontWeight:sel?700:500,color:sel?C.dark:"#495057"}}>{o}</span>
              </div>);
            })}
          </div>
        </div>
      </div>
      <div style={{padding:"12px 20px 28px",flexShrink:0}}>
        <button onClick={next} disabled={!hasA} style={{width:"100%",padding:16,borderRadius:14,border:"none",background:hasA?C.cyan:"#DEE2E6",color:hasA?"#fff":"#94A3B8",fontSize:16,fontWeight:700,cursor:hasA?"pointer":"default"}}>
          {qi<questions.length-1?"다음":"분석 결과 보기"}
        </button>
      </div>
    </Phone>
  );
}

            <div style={{fontSize:12,color:"#94A3B8",marginBottom:10}}>리스크 TOP3 (카테고리 수준)</div>

          </div>
        </div>
